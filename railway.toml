[build]
builder = "RAILPACK"
buildCommand = "npm install && npm run build --workspace=packages/shared && npm run build --workspace=apps/engine && npm run build --workspace=apps/dashboard"

[deploy]
startCommand = "bash start.sh"
healthcheckPath = "/api/state"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
